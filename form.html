<!DOCTYPE html>
<html>
<head>
    <title>Forms</title>
</head>
<body>

    <h1>FORMS</h1>

    <form>

        <label>Name</label>
        <input type="text" placeholder="Name">
        <br><br>

        <label>Email-id</label>
        <input type="email" placeholder="Email-id">
        <br><br>

        <label>Password</label>
        <input type="password" placeholder="Password">
        <br><br>

        <label>Language</label>
        <br><br>

        <input type="radio" name="lang" > HTML <br>
        <input type="radio" name="lang"> CSS <br>
        <input type="radio" name="lang"> JS

        <br><br>

        <label>Course</label>
        <br><br>

        <input type="checkbox"> Java Stack <br>
        <input type="checkbox"> Data Science <br>
        <input type="checkbox"> Mern Stack

        <br><br>

        <label>Field:</label>
        <br><br>

        <select>
            <option>Select</option>
            <option>Developer</option>
            <option>Designer</option>
            <option>Tester</option>
        </select>

        <br><br>

        <textarea rows="4" cols="30" placeholder="Describe yourself"></textarea>

        <br><br>

        <label>Date</label>
        <br><br>

        <input type="date">

        <br><br>

        <label>Phone No.</label>
        <input type="tel" placeholder="Phone No.">

        <br><br>

        <input type="submit" value="submit">

    </form>

    <br><br>

    <a href="table.html">Click Here For Table File</a>

</body>
</html>
